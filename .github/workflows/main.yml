name: CI/CD Pipeline Web Application

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Full-Stack Verification
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Execute Flask integrity tests
        run: pytest test_app.py -v

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com/production  # You can change this to your actual deployment URL
    
    steps:
      - name: 🚀 Simulate Deployment
        run: |
          echo "Simulating deployment to production server..."
          echo "Deployment successful! 🌍"
